# DiffAero commander — single-drone simulation configuration.
#
# Isaac Sim: spawn with NUM_ROBOTS=1 (drone_1 spawns at x=0, offset=0).
# MAVROS interface: ./src/svg_ground_control/scripts/launch_sim_interfaces.sh 1
#
# Launch:
#   ros2 launch svg_ground_control diffaero_single.launch.py
#
# Fly:
#   ros2 service call /diffaero_commander/takeoff std_srvs/srv/Trigger
#   ros2 service call /diffaero_commander/start   std_srvs/srv/Trigger
#   ros2 service call /diffaero_commander/land    std_srvs/srv/Trigger

diffaero_commander:
  ros__parameters:
    drone_name: "drone_1"
    drone_mode: "sim"

    scenario: "hover"
    scenario_speed_mps: 0.6
    arena_low: [-2.0, -2.0, 0.8]
    arena_high: [2.0, 2.0, 2.0]

    # NUM_ROBOTS=1: drone_1 spawns at x=0, so offset=0 (raw odom == world frame).
    drone_position_offset: [0.0, 0.0, 0.0]
    hover_positions: [0.0, 0.0, 0.3]
    goal_position: [-2.0, -2.0, 2.0]

    control_rate_hz: 30.0
    hover_kp: 1.0
    arrival_threshold_m: 0.15
    land_speed_mps: 0.3
    land_complete_altitude_m: 0.15

    fence_enabled: true
    fence_min: [-3.0, -3.0, 0.0]
    fence_max: [3.0, 3.0, 3.0]

    checkpoint_path: "/root/AirStack/robot/ros_ws/checkpoints/diffaero/sha2c_pmc_lag_2026-06-22/"
    max_accel: 20.0   # SITL: hover ≈ 0.5 throttle → tune this if drone climbs/sinks

    # Cruise speed: target_vel = (goal - pos) saturated to max_vel. Training
    # sampled [3, 6] m/s — far too fast/violent for a short indoor hop. Keep
    # this low for tame flights; raise toward 3+ only once behavior is smooth.
    max_vel: 1.5
    # Cap the policy's horizontal action scale to limit launch aggressiveness:
    # max tilt ≈ atan(max_acc_xy / g). 6.0 → ~31° (vs ~64° at the 20.0 default).
    # NOTE: this deviates from the action limits the policy was exported with,
    # so tracking may be slightly off — raise back toward 20 if it feels sluggish.
    max_acc_xy: 3.0
    # Switch from the cruise policy to a stable pose-hold this far from the goal.
    goal_arrival_threshold_m: 0.4

