# SVG ground control — SINGLE-DRONE goal-tracking test (sim OR real).
#
# ONE config for both worlds: `drone_modes` is the only switch — "sim" routes
# commands to /{name}/interface/* (SITL/MAVROS), "real" to /{name}/fmu/*
# (hardware/px4_interface). Nothing else changes.
#
# Mocap is ALWAYS on — launch with use_mocap:=true:
#   * real -> mocap_bridge feeds PX4 EKF2 the external vision it needs to arm
#             (mocap -> /drone_1/fmu/in/vehicle_visual_odometry; see B4b). This
#             is the ONLY path that makes EKF2 fuse a position indoors.
#   * sim  -> there is no /drone_1/pose to consume, so mocap_bridge is a harmless
#             no-op (SITL estimates its own state).
#
#   ros2 launch svg_ground_control ground_control.launch.py \
#       config:=<share>/config/goal_single.yaml use_mocap:=true
#
# REAL prerequisites (NOT in this file): the drone connected per Part B, and the
# EKF2 external-vision params set per drone first (experiment.md B4b:
# EKF2_EV_CTRL / EKF2_HGT_REF=Vision / EKF2_GPS_CTRL=0).
#
# One drone, 'goal' scenario: after takeoff + start it holds its takeoff
# point until you retarget it live. Send a goal and (optionally) a speed:
#   ros2 topic pub --once /svg/drone_1/goal_command geometry_msgs/msg/PoseStamped \
#     "{header: {frame_id: map}, pose: {position: {x: 1.0, y: 0.5, z: 1.4}}}"
#   ros2 topic pub --once /svg/drone_1/speed_command std_msgs/msg/Float32 "{data: 0.8}"

swarm_commander:
  ros__parameters:
    drone_names: ["drone_2"]
    # ---- Per-drone axes (any drone, any combination) -------------------
    # mode   : drone_modes       "sim"  -> /{name}/interface/* (MAVROS/SITL)
    #                            "real" -> /{name}/fmu/*        (px4_interface/HW)
    # role   : teleop_drones (operator-driven), external_drones (tracked but
    #          never commanded); unlisted = auto (scenario-driven)
    # safety : cbf_exempt_drones  CBF leaves these uncorrected (still obstacles)
    # All comma-separated name STRINGS ("" = none). To fly this drone for REAL
    # set drone_modes: "real" — routing switches to /fmu/, nothing else changes.
    drone_modes: "real"
    teleop_drones: ""
    external_drones: ""
    cbf_exempt_drones: "drone_2"

    scenario: "goal"
    scenario_speed_mps: 0.6          # default per-drone speed (override live)
    arena_low: [-3.0, -3.0, 0.5]
    arena_high: [3.0, 3.0, 2.5]
    # sim: 1 drone spawns at x=0 (Isaac formula 2*(i-1)-(N-1)); real: mocap
    # anchors the EKF to the shared origin. offset 0 is correct for both.
    drone_position_offsets: [0.0, 0.0, 0.0]
    # goal scenario: takeoff target = initial goal
    hover_positions: [-3.6, -4.7, 1.0]

    # State topic is identical for sim & real. Command/service routing is
    # picked per drone by drone_modes via the built-in mode templates
    # (sim -> /{name}/interface/*, real -> /{name}/fmu/*) — no need to set them.
    state_topic_template: "/{name}/odometry_conversion/odometry"

    control_rate_hz: 20.0
    hover_kp: 1.0
    arrival_threshold_m: 0.15
    land_speed_mps: 0.3
    land_complete_altitude_m: 0.15

    cbf_safety_radius_m: 0.55
    cbf_max_speed_mps: 1.2
    cbf_alpha: 2.5

    # Geofence: a generous box around the arena; breach -> all hold.
    fence_enabled: true
    fence_min: [-4.0, -5.0, 0.0]
    fence_max: [4.0, 5.0, 2.8]
# Mocap -> PX4 external-vision bridge (used when launched with use_mocap:=true).
# REAL: feeds /drone_1/fmu/in/vehicle_visual_odometry so EKF2 fuses a position
# and the drone can arm (mirrors the proven model_ai_tfpub.cpp). SIM: no
# /drone_1/pose publisher exists, so this node idles (harmless).
mocap_bridge:
  ros__parameters:
    drone_names: ["drone_2"]
    # Mocap pose topic per drone (natnet_ros2 / Motive body named drone_1).
    # Check the exact prefix with `ros2 topic list | grep pose`.
    mocap_topic_template: "/{name}/pose"
    # 'direct' (default): px4_msgs/VehicleOdometry straight to PX4 (timestamp 0,
    # quality 100, velocity NaN — pose only). 'via_interface' hands a
    # nav_msgs/Odometry to px4_interface instead.
    px4_vio_mode: "direct"
    # 'enu_to_ned' if mocap is ROS-standard ENU; 'modalai_flip' (the reference
    # transform) if it is Motive's raw frame. VERIFY with the B4b hand-check
    # before flying — a wrong frame flies the drone into a wall. (direct only)
    px4_vio_frame: "enu_to_ned"
    vio_quality: 100                                                 # direct only
    px4_vio_topic_template: "/{name}/fmu/in/vehicle_visual_odometry"  # direct
    visual_odometry_topic_template: "/{name}/fmu/visual_odometry_in"  # via_interface
    mocap_frame: "map"
    velocity_filter_alpha: 0.4                                       # via_interface only
    mocap_qos_best_effort: false
